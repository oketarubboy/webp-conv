<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>画像切り抜き</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--text:#111827;--muted:#6b7280;--border:#d1d5db;--accent:#2563eb;--green:#059669;--dark:#374151;--danger:#dc2626;--safe-bottom:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);padding:16px 12px calc(96px + var(--safe-bottom))}
main{max-width:760px;margin:auto}
.card{background:#fff;border:1px solid var(--border);border-radius:18px;padding:14px;box-shadow:0 8px 24px rgba(0,0,0,.06)}
h1{font-size:22px;text-align:center;margin:6px 0 8px}
p{color:var(--muted);line-height:1.6;font-size:13px}
.section{border:1px solid var(--border);border-radius:14px;padding:12px;margin:12px 0;background:#fff}
.section-title{font-weight:900;margin-bottom:8px}
input,select,button{font-size:16px}
input[type=file]{width:100%;border:2px solid var(--accent);border-radius:14px;background:#eff6ff;padding:14px}
input[type=file]::file-selector-button{border:0;background:var(--accent);color:white;border-radius:12px;padding:10px 12px;font-weight:800;margin-right:10px}
label{display:block;font-weight:800;color:var(--muted);font-size:13px;margin:10px 0 6px}
select,input[type=number]{width:100%;min-height:44px;border:1px solid var(--border);border-radius:12px;padding:8px;background:white}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.notice,.error{border-radius:14px;padding:11px 12px;line-height:1.6;font-size:13px;margin-bottom:12px}
.notice{background:#eff6ff;color:#1e3a8a}
.error{display:none;background:#fef2f2;color:var(--danger);font-weight:800}
.crop-wrap{width:min(340px,88vw);margin:0 auto}
.crop-box{width:100%;aspect-ratio:1/1;border:1px solid var(--border);border-radius:16px;overflow:hidden;background:linear-gradient(45deg,#eee 25%,transparent 25%),linear-gradient(-45deg,#eee 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#eee 75%),linear-gradient(-45deg,transparent 75%,#eee 75%);background-size:20px 20px;background-position:0 0,0 10px,10px -10px,-10px 0}
#cropCanvas{display:block;width:100%;height:100%;touch-action:none;cursor:grab}
#cropCanvas:active{cursor:grabbing}
.help{text-align:center;color:var(--muted);font-size:12px;line-height:1.6;margin-top:8px}
.mini-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
.mini-actions button{border:0;border-radius:12px;background:#e5e7eb;color:#111827;font-weight:800;min-height:42px}
.status{border:1px solid var(--border);border-radius:14px;padding:12px;margin-top:12px;background:white;font-size:14px;line-height:1.7}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.save,.share{border:0;border-radius:12px;padding:12px 13px;color:white;font-size:15px;font-weight:900;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;min-height:46px}
.save{background:var(--green)}.share{background:var(--dark)}
#outputCanvas{display:none}
.bottom{position:fixed;left:0;right:0;bottom:0;padding:10px 12px calc(10px + var(--safe-bottom));background:rgba(255,255,255,.94);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--border)}
.bottom-inner{max-width:760px;margin:auto;display:grid;grid-template-columns:1.4fr .75fr;gap:10px}
button.main,button.clear{min-height:58px;border:0;border-radius:16px;color:white;font-weight:900;font-size:16px}
button.main{background:var(--accent)}button.clear{background:var(--dark)}
@media(max-width:430px){.grid2{grid-template-columns:1fr}.mini-actions{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<main>
<div class="card">
<h1>画像切り抜き</h1>
<p>ドラッグで位置調整、ピンチイン・ピンチアウトで拡大縮小できます。画像はブラウザ内だけで処理します。</p>
<div class="notice">画質は95%固定です。余白色は「灰色・ピンク・白・紫・水色」から選択できます。</div>
<div id="error" class="error"></div>

<div class="section">
  <div class="section-title">1. 画像を選ぶ</div>
  <input id="fileInput" type="file" accept="image/*">
</div>

<div class="section">
  <div class="section-title">2. 切り抜き範囲を調整</div>
  <div class="crop-wrap">
    <div class="crop-box"><canvas id="cropCanvas" width="512" height="512"></canvas></div>
    <div class="help">1本指ドラッグ：位置調整<br>2本指ピンチ：拡大・縮小</div>
    <div class="mini-actions">
      <button id="zoomOutBtn" type="button">－ 縮小</button>
      <button id="resetBtn" type="button">中央に戻す</button>
      <button id="zoomInBtn" type="button">＋ 拡大</button>
    </div>
  </div>
</div>

<div class="section">
  <div class="section-title">3. 出力設定</div>
  <div class="grid2">
    <div>
      <label for="size">出力サイズ</label>
      <input id="size" type="number" value="512" min="16" max="4096">
    </div>
    <div>
      <label for="bgColor">余白の色</label>
      <select id="bgColor">
        <option value="#9ca3af">灰色</option>
        <option value="#f9a8d4">ピンク</option>
        <option value="#ffffff" selected>白</option>
        <option value="#c4b5fd">紫</option>
        <option value="#bae6fd">水色</option>
      </select>
    </div>
  </div>
</div>

<div id="status" class="status">まだ画像が選択されていません。</div>
<canvas id="outputCanvas"></canvas>
</div>
</main>

<div class="bottom">
  <div class="bottom-inner">
    <button id="cropBtn" class="main" type="button">画像切り抜き</button>
    <button id="clearBtn" class="clear" type="button">クリア</button>
  </div>
</div>

<script>
(() => {
  const fileInput = document.getElementById("fileInput");
  const cropCanvas = document.getElementById("cropCanvas");
  const cctx = cropCanvas.getContext("2d");
  const outputCanvas = document.getElementById("outputCanvas");
  const octx = outputCanvas.getContext("2d");
  const statusBox = document.getElementById("status");
  const errorBox = document.getElementById("error");
  const cropBtn = document.getElementById("cropBtn");
  const clearBtn = document.getElementById("clearBtn");
  const resetBtn = document.getElementById("resetBtn");
  const zoomInBtn = document.getElementById("zoomInBtn");
  const zoomOutBtn = document.getElementById("zoomOutBtn");
  const bgColorSelect = document.getElementById("bgColor");

  const C = 512;
  let img = null, currentFile = null;
  let x = 0, y = 0, scale = 1, minScale = 1, maxScale = 8;
  let lastUrl = null;
  const pointers = new Map();
  let dragStart = null, pinchStart = null;

  function showError(msg){ errorBox.style.display = msg ? "block" : "none"; errorBox.textContent = msg || ""; }
  function status(html){ statusBox.innerHTML = html; }
  function escapeHtml(str){ return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
  function bytes(n){ if(n < 1024) return n + " B"; const kb = n / 1024; if(kb < 1024) return kb.toFixed(1) + " KB"; return (kb / 1024).toFixed(2) + " MB"; }
  function baseName(name){ return (name || "image").replace(/\.[^.]+$/, ""); }
  function revokeLastUrl(){ if(lastUrl){ URL.revokeObjectURL(lastUrl); lastUrl = null; } }

  function drawPlaceholder(){
    cctx.clearRect(0,0,C,C);
    cctx.fillStyle = "#f9fafb";
    cctx.fillRect(0,0,C,C);
    cctx.fillStyle = "#6b7280";
    cctx.font = "bold 28px system-ui, sans-serif";
    cctx.textAlign = "center";
    cctx.textBaseline = "middle";
    cctx.fillText("画像を選択してください", C/2, C/2);
  }

  function calcMinScale(){
    if(!img) return 1;
    return Math.min(C / img.naturalWidth, C / img.naturalHeight);
  }

  function fitCenter(){
    if(!img) return;
    minScale = calcMinScale();
    maxScale = Math.max(minScale * 8, minScale + 0.0001);
    scale = minScale;
    x = (C - img.naturalWidth * scale) / 2;
    y = (C - img.naturalHeight * scale) / 2;
    clampTransform();
    drawCrop();
  }

  function clampTransform(){
    if(!img) return;
    const w = img.naturalWidth * scale;
    const h = img.naturalHeight * scale;

    if(w <= C){
      if(x < 0) x = 0;
      if(x > C - w) x = C - w;
    }else{
      if(x > 0) x = 0;
      if(x + w < C) x = C - w;
    }

    if(h <= C){
      if(y < 0) y = 0;
      if(y > C - h) y = C - h;
    }else{
      if(y > 0) y = 0;
      if(y + h < C) y = C - h;
    }
  }

  function drawCrop(){
    cctx.clearRect(0,0,C,C);
    cctx.fillStyle = bgColorSelect.value;
    cctx.fillRect(0,0,C,C);
    if(!img){ drawPlaceholder(); return; }
    cctx.imageSmoothingEnabled = true;
    cctx.imageSmoothingQuality = "high";
    cctx.drawImage(img, x, y, img.naturalWidth * scale, img.naturalHeight * scale);
    cctx.save();
    cctx.strokeStyle = "rgba(255,255,255,.9)";
    cctx.lineWidth = 2;
    cctx.beginPath();
    cctx.moveTo(C/3, 0); cctx.lineTo(C/3, C);
    cctx.moveTo(C*2/3, 0); cctx.lineTo(C*2/3, C);
    cctx.moveTo(0, C/3); cctx.lineTo(C, C/3);
    cctx.moveTo(0, C*2/3); cctx.lineTo(C, C*2/3);
    cctx.stroke();
    cctx.restore();
  }

  function canvasPoint(event){
    const r = cropCanvas.getBoundingClientRect();
    return { x: (event.clientX - r.left) * (C / r.width), y: (event.clientY - r.top) * (C / r.height) };
  }

  function distance(a,b){ return Math.hypot(a.x - b.x, a.y - b.y); }
  function midpoint(a,b){ return { x:(a.x+b.x)/2, y:(a.y+b.y)/2 }; }

  function zoomAt(point, factor){
    if(!img) return;
    const oldScale = scale;
    const nextScale = Math.max(minScale, Math.min(maxScale, scale * factor));
    const imgX = (point.x - x) / oldScale;
    const imgY = (point.y - y) / oldScale;
    scale = nextScale;
    x = point.x - imgX * scale;
    y = point.y - imgY * scale;
    clampTransform();
    drawCrop();
  }

  function loadFile(file){
    return new Promise((resolve,reject)=>{
      const reader = new FileReader();
      reader.onload = () => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = () => reject(new Error("画像を読み込めませんでした。別の画像で試してください。"));
        image.src = reader.result;
      };
      reader.onerror = () => reject(new Error("ファイルの読み込みに失敗しました。"));
      reader.readAsDataURL(file);
    });
  }

  async function readSelected(){
    showError("");
    const file = fileInput.files && fileInput.files[0];
    if(!file){ status("まだ画像が選択されていません。"); return; }
    try{
      status("画像を読み込み中...");
      currentFile = file;
      img = await loadFile(file);
      fitCenter();
      status(`${escapeHtml(file.name || "選択画像")}<br>${bytes(file.size)} / ${img.naturalWidth}×${img.naturalHeight}px<br>ドラッグ・ピンチで切り抜き範囲を調整してください。`);
    }catch(e){
      showError(e.message || String(e));
      status("画像の読み込みに失敗しました。");
    }
  }

  function outputToBlob(type, quality){
    return new Promise((resolve,reject)=>{
      outputCanvas.toBlob(blob => blob ? resolve(blob) : reject(new Error("画像の出力に失敗しました。")), type, quality);
    });
  }

  async function shareOnlyFile(blob, fileName, type){
    const file = new File([blob], fileName, { type });
    if(navigator.canShare && navigator.canShare({ files:[file] }) && navigator.share){
      await navigator.share({ files:[file] });
      return true;
    }
    return false;
  }

  async function cropImage(){
    showError("");
    if(!img){
      const file = fileInput.files && fileInput.files[0];
      if(file) await readSelected();
    }
    if(!img){ showError("先に画像を選択してください。"); return; }

    try{
      status("画像を切り抜き中...");
      const size = Math.max(16, Math.min(4096, Number(document.getElementById("size").value || 512)));
      const bgColor = bgColorSelect.value;
      const quality = 0.95;

      outputCanvas.width = size;
      outputCanvas.height = size;
      const ratio = size / C;
      octx.clearRect(0,0,size,size);
      octx.fillStyle = bgColor;
      octx.fillRect(0,0,size,size);
      octx.imageSmoothingEnabled = true;
      octx.imageSmoothingQuality = "high";
      octx.drawImage(img, x * ratio, y * ratio, img.naturalWidth * scale * ratio, img.naturalHeight * scale * ratio);

      const blob = await outputToBlob("image/webp", quality);
      revokeLastUrl();
      lastUrl = URL.createObjectURL(blob);

      const fileName = `${baseName(currentFile ? currentFile.name : "image")}_${size}x${size}.webp`;
      const canShare = !!(navigator.canShare && navigator.share);

      status(`${escapeHtml(fileName)}<br>${size}×${size}px / ${bytes(blob.size)} / WebP / 画質95%<div class="actions"><a class="save" href="${lastUrl}" download="${escapeHtml(fileName)}">保存</a>${canShare ? '<button id="shareBtn" class="share" type="button">共有</button>' : ''}</div><span style="color:#6b7280;font-size:12px">iPhoneでは「共有」→「ファイルに保存」が安定です。</span>`);

      const shareBtn = document.getElementById("shareBtn");
      if(shareBtn){
        shareBtn.addEventListener("click", async () => {
          try{
            const ok = await shareOnlyFile(blob, fileName, "image/webp");
            if(!ok) showError("このブラウザでは共有保存に対応していません。保存ボタンを試してください。");
          }catch{
            showError("共有がキャンセルされたか、保存に失敗しました。");
          }
        });
      }
    }catch(e){
      showError(e.message || String(e));
      status("画像の切り抜きに失敗しました。");
    }
  }

  function clearAll(){
    revokeLastUrl();
    fileInput.value = "";
    currentFile = null;
    img = null;
    x = y = 0;
    scale = minScale = 1;
    pointers.clear();
    dragStart = null;
    pinchStart = null;
    showError("");
    drawPlaceholder();
    status("まだ画像が選択されていません。");
  }

  cropCanvas.addEventListener("pointerdown", e => {
    if(!img) return;
    cropCanvas.setPointerCapture(e.pointerId);
    pointers.set(e.pointerId, canvasPoint(e));
    if(pointers.size === 1){
      const p = [...pointers.values()][0];
      dragStart = { p, x, y };
      pinchStart = null;
    }else if(pointers.size === 2){
      const pts = [...pointers.values()];
      const mid = midpoint(pts[0], pts[1]);
      pinchStart = { dist: distance(pts[0], pts[1]), scale, imagePoint: { x:(mid.x - x) / scale, y:(mid.y - y) / scale } };
      dragStart = null;
    }
  });

  cropCanvas.addEventListener("pointermove", e => {
    if(!img || !pointers.has(e.pointerId)) return;
    pointers.set(e.pointerId, canvasPoint(e));
    if(pointers.size === 1 && dragStart){
      const p = [...pointers.values()][0];
      x = dragStart.x + (p.x - dragStart.p.x);
      y = dragStart.y + (p.y - dragStart.p.y);
      clampTransform();
      drawCrop();
    }else if(pointers.size === 2 && pinchStart){
      const pts = [...pointers.values()];
      const mid = midpoint(pts[0], pts[1]);
      const d = distance(pts[0], pts[1]);
      const nextScale = Math.max(minScale, Math.min(maxScale, pinchStart.scale * (d / pinchStart.dist)));
      scale = nextScale;
      x = mid.x - pinchStart.imagePoint.x * scale;
      y = mid.y - pinchStart.imagePoint.y * scale;
      clampTransform();
      drawCrop();
    }
  });

  function endPointer(e){
    if(pointers.has(e.pointerId)) pointers.delete(e.pointerId);
    if(pointers.size === 1){
      const p = [...pointers.values()][0];
      dragStart = { p, x, y };
      pinchStart = null;
    }else{
      dragStart = null;
      pinchStart = null;
    }
  }

  cropCanvas.addEventListener("pointerup", endPointer);
  cropCanvas.addEventListener("pointercancel", endPointer);
  cropCanvas.addEventListener("wheel", e => {
    if(!img) return;
    e.preventDefault();
    const p = canvasPoint(e);
    zoomAt(p, e.deltaY < 0 ? 1.08 : 0.92);
  }, { passive:false });

  fileInput.addEventListener("change", readSelected);
  cropBtn.addEventListener("click", cropImage);
  clearBtn.addEventListener("click", clearAll);
  resetBtn.addEventListener("click", fitCenter);
  zoomInBtn.addEventListener("click", () => zoomAt({x:C/2,y:C/2}, 1.15));
  zoomOutBtn.addEventListener("click", () => zoomAt({x:C/2,y:C/2}, 0.87));
  bgColorSelect.addEventListener("change", drawCrop);

  drawPlaceholder();
})();
</script>
</body>
</html>
